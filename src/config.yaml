#src/config.yaml
system:
  output_dir: data/outputs
  results_dir: results
  uploads_dir: data/uploads
  host: 0.0.0.0
  port: 8000

detection:
  default_model: yolo11n.pt
  confidence: 0.22
  iou: 0.8

tracking:
  default_tracker: bytetrack.yaml

roi:
  default_mode: polygon

ui:
  lock_when_running: true

classes:
  coco_vehicle_ids:
    - 2   # car
    - 3   # motorcycle
    - 5   # bus
    - 7   # truck
    - 1   # bicycle
    - 0   # person
  labels:
    0: person
    1: bicycle
    2: car
    3: motorcycle
    5: bus
    7: truck

models:
models:
  - value: yolo11n.pt
    name: YOLO11n (Fastest)

  - value: yolo11s.pt
    name: YOLO11s (Balanced)

  - value: yolo11m.pt
    name: YOLO11m (Recommended)

  - value: yolo11l.pt
    name: YOLO11l (High Accuracy)

  - value: yolo11x.pt
    name: YOLO11x (Best Accuracy)

trackers:
  - value: bytetrack.yaml
    name: ByteTrack

  - value: botsort.yaml
    name: BoTSORT