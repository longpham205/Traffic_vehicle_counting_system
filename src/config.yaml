#src/config.yaml
system:
  output_dir: data/outputs
  results_dir: results
  uploads_dir: data/uploads
  host: 0.0.0.0
  port: 8000

detection:
  default_model: yolo26n.pt
  confidence: 0.25
  iou: 0.7

tracking:
  default_tracker: deepsort.yaml

roi:
  default_mode: polygon

ui:
  lock_when_running: true
  default_selected_classes:
    - 1  # bicycle
    - 2  # car
    - 3  # motorcycle
  stats_poll_interval_ms: 800
  toast_duration_ms: 3000
  camera_restart_delay_ms: 300
  camera_stop_delay_ms: 800
  result_show_delay_ms: 1500
  status_labels:
    idle: IDLE
    running: RUNNING
    paused: PAUSED
    stopped: STOPPED
    done: DONE

classes:
  coco_vehicle_ids:
    - 2   # car
    - 3   # motorcycle
    - 5   # bus
    - 7   # truck
    - 1   # bicycle
  labels:
    1: bicycle
    2: car
    3: motorcycle
    5: bus
    7: truck
  display:
    1: { label: Bicycle,    icon: "🚲",  color: "#06b6d4", border: "#06b6d4" }
    2: { label: Car,        icon: "🚗",  color: "#2563eb", border: "#2563eb" }
    3: { label: Motorcycle, icon: "🏍",  color: "#a855f7", border: "#a855f7" }
    5: { label: Bus,        icon: "🚌",  color: "#22c55e", border: "#22c55e" }
    7: { label: Truck,      icon: "🚛",  color: "#f59e0b", border: "#f59e0b" }

models:
  # YOLO26
  - value: yolo26n.pt
    name: YOLO26n (Fastest CPU)

  - value: yolo26s.pt
    name: YOLO26s (Balanced + Better Small Objects)

  - value: yolo26m.pt
    name: YOLO26m (Recommended for Vehicle Counting)

  - value: yolo26l.pt
    name: YOLO26l (High Accuracy)

  - value: yolo26x.pt
    name: YOLO26x (Best Accuracy)

#yolo11
  - value: yolo11n.pt
    name: YOLO11n (Fastest)

  - value: yolo11s.pt
    name: YOLO11s (Balanced)

  - value: yolo11m.pt
    name: YOLO11m (Recommended)

  - value: yolo11l.pt
    name: YOLO11l (High Accuracy)

  - value: yolo11x.pt
    name: YOLO11x (Best Accuracy)

trackers:
  - value: bytetrack.yaml
    name: ByteTrack

  - value: botsort.yaml
    name: BoTSORT

  - value: deepsort.yaml
    name: DeepSORT